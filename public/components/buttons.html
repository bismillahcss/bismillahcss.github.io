<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BismillahCSS - Buttons Component</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bismillahcss/dist/bismillah.min.css">
    <link rel="stylesheet" href="./attractive.css">
</head>

<body class="bismillah-p-10">
    <h1 class="bismillah-text-4xl bismillah-font-extrabold bismillah-mb-10">Buttons Component</h1>

    <div class="bismillah-grid bismillah-grid-3">
        <div class="bismillah-card">
            <h2 class="bismillah-text-xl bismillah-mb-5">Primary Button</h2>
            <button class="bismillah-btn bismillah-btn-primary">Click Me</button>
        </div>

        <div class="bismillah-card">
            <h2 class="bismillah-text-xl bismillah-mb-5">Secondary Button</h2>
            <button class="bismillah-btn bismillah-btn-secondary">Submit</button>
        </div>

        <div class="bismillah-card">
            <h2 class="bismillah-text-xl bismillah-mb-5">Glass Button</h2>
            <div class="bismillah-glass bismillah-p-5">
                <button class="bismillah-btn bismillah-btn-primary bismillah-glass">Glass Button</button>
            </div>
        </div>
    </div>

    <div class="bismillah-mt-10">
        <a href="../index.html" class="bismillah-btn bismillah-btn-secondary">Back to Home</a>
    </div>
</body>

</html>
