<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BismillahCSS - Forms Component</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bismillahcss/dist/bismillah.min.css">
    <link rel="stylesheet" href="./attractive.css">
</head>

<body class="bismillah-p-10">
    <h1 class="bismillah-text-4xl bismillah-font-extrabold bismillah-mb-10">Forms Component</h1>

    <div class="bismillah-card bismillah-max-width" style="max-width: 600px;">
        <form class="bismillah-p-5">
            <div class="bismillah-mb-5">
                <label class="bismillah-label bismillah-mb-2">Full Name</label>
                <input type="text" class="bismillah-input bismillah-full-width" placeholder="Enter your name">
            </div>

            <div class="bismillah-mb-5">
                <label class="bismillah-label bismillah-mb-2">Email Address</label>
                <input type="email" class="bismillah-input bismillah-full-width" placeholder="email@example.com">
            </div>

            <div class="bismillah-mb-5">
                <label class="bismillah-label bismillah-mb-2">Message</label>
                <textarea class="bismillah-input bismillah-full-width" style="height: 100px;"
                    placeholder="Your message..."></textarea>
            </div>

            <div class="bismillah-mb-5 bismillah-flex" style="gap: 10px;">
                <input type="checkbox" id="check" class="bismillah-checkbox">
                <label for="check">I agree to the terms and conditions</label>
            </div>

            <button type="submit" class="bismillah-btn bismillah-btn-primary">Send Feedback</button>
        </form>
    </div>

    <div class="bismillah-mt-10">
        <a href="../index.html" class="bismillah-btn bismillah-btn-secondary">Back to Home</a>
    </div>
</body>

</html>
