<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BismillahCSS - Tables Component</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bismillahcss/dist/bismillah.min.css">
    <link rel="stylesheet" href="./attractive.css">
</head>

<body class="bismillah-p-10">
    <h1 class="bismillah-text-4xl bismillah-font-extrabold bismillah-mb-10">Tables Component</h1>

    <div class="bismillah-card bismillah-p-5">
        <table class="bismillah-table bismillah-full-width">
            <thead>
                <tr class="bismillah-bg-light">
                    <th class="bismillah-p-3 bismillah-text-left">Project</th>
                    <th class="bismillah-p-3 bismillah-text-left">Status</th>
                    <th class="bismillah-p-3 bismillah-text-left">Completion</th>
                </tr>
            </thead>
            <tbody>
                <tr class="bismillah-border-b">
                    <td class="bismillah-p-3">BismillahCSS Framework</td>
                    <td class="bismillah-p-3"><span class="bismillah-badge bismillah-badge-success">Active</span></td>
                    <td class="bismillah-p-3">95%</td>
                </tr>
                <tr class="bismillah-border-b">
                    <td class="bismillah-p-3">Documentation Site</td>
                    <td class="bismillah-p-3"><span class="bismillah-badge bismillah-badge-info">Stable</span></td>
                    <td class="bismillah-p-3">100%</td>
                </tr>
                <tr>
                    <td class="bismillah-p-3">Character Lab</td>
                    <td class="bismillah-p-3"><span class="bismillah-badge bismillah-bg-warning">Beta</span></td>
                    <td class="bismillah-p-3">40%</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="bismillah-mt-10">
        <a href="../index.html" class="bismillah-btn bismillah-btn-secondary">Back to Home</a>
    </div>
</body>

</html>
