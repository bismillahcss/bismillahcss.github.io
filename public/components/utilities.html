<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BismillahCSS - Utilities Component</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bismillahcss/dist/bismillah.min.css">
    <link rel="stylesheet" href="./attractive.css">
</head>

<body class="bismillah-p-10">
    <h1 class="bismillah-text-4xl bismillah-font-extrabold bismillah-mb-10">Utilities Showcase</h1>

    <div class="bismillah-grid bismillah-grid-3">
        <div class="bismillah-card bismillah-p-5">
            <h3 class="bismillah-text-xl bismillah-mb-3">Spacing</h3>
            <div class="bismillah-p-5 bismillah-bg-primary bismillah-mb-3">Padding 5</div>
            <div class="bismillah-m-5 bismillah-bg-secondary bismillah-text-light">Margin 5</div>
        </div>

        <div class="bismillah-card bismillah-p-5">
            <h3 class="bismillah-text-xl bismillah-mb-3">Flex & Grid</h3>
            <div class="bismillah-flex bismillah-p-3 bismillah-bg-light bismillah-mb-3">Centered Flex</div>
            <div class="bismillah-grid bismillah-grid-3 bismillah-gap-1">
                <div class="bismillah-bg-primary bismillah-p-2"></div>
                <div class="bismillah-bg-secondary bismillah-p-2"></div>
                <div class="bismillah-bg-accent bismillah-p-2"></div>
            </div>
        </div>

        <div class="bismillah-card bismillah-p-5">
            <h3 class="bismillah-text-xl bismillah-mb-3">Theming</h3>
            <div class="bismillah-p-3 bismillah-bg-dark bismillah-text-light bismillah-mb-3">Dark Mode Utility</div>
            <div class="bismillah-p-3 bismillah-bg-white bismillah-border-primary">White with Border</div>
        </div>
    </div>

    <div class="bismillah-mt-10">
        <a href="../index.html" class="bismillah-btn bismillah-btn-secondary">Back to Home</a>
    </div>
</body>

</html>
