<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BismillahCSS - Characters Component</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bismillahcss/dist/bismillah.min.css">
    <link rel="stylesheet" href="./attractive.css">
</head>

<body class="bismillah-p-10">
    <h1 class="bismillah-text-4xl bismillah-font-extrabold bismillah-mb-10 text-center">Character Components</h1>

    <div class="bismillah-grid bismillah-grid-2">
        <div class="bismillah-card text-center bismillah-p-10">
            <h2 class="bismillah-text-2xl bismillah-mb-5">Pikachu</h2>
            <div class="bismillah-pikachu">
                <div class="bismillah-pikachu-ears"></div>
            </div>
            <p>Built with Pure BismillahCSS Utilities</p>
        </div>

        <div class="bismillah-card text-center bismillah-p-10">
            <h2 class="bismillah-text-2xl bismillah-mb-5">Doraemon</h2>
            <div class="bismillah-doraemon">
                <div class="bismillah-doraemon-face"></div>
            </div>
            <p>Modern CSS Character Styling</p>
        </div>

        <div class="bismillah-card text-center bismillah-p-10">
            <h2 class="bismillah-text-2xl bismillah-mb-5">Spongebob</h2>
            <div class="bismillah-spongebob">
                <div class="bismillah-spongebob-eye left"></div>
                <div class="bismillah-spongebob-eye right"></div>
                <div class="bismillah-spongebob-mouth"></div>
            </div>
            <p>Vibrant Animated Styles</p>
        </div>

        <div class="bismillah-card text-center bismillah-p-10">
            <h2 class="bismillah-text-2xl bismillah-mb-5">Mario</h2>
            <div class="bismillah-mario">
                <div class="bismillah-mario-head"></div>
                <div class="bismillah-mario-hat"></div>
            </div>
            <p>Retro Gaming with Modern CSS</p>
        </div>
    </div>

    <div class="bismillah-mt-10">
        <a href="../index.html" class="bismillah-btn bismillah-btn-secondary">Back to Home</a>
    </div>
</body>

</html>
