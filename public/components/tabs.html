<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BismillahCSS - Tabs Component</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bismillahcss/dist/bismillah.min.css">
    <link rel="stylesheet" href="./attractive.css">
</head>

<body class="bismillah-p-10">
    <h1 class="bismillah-text-4xl bismillah-font-extrabold bismillah-mb-10 text-center">Tabs Component</h1>

    <div class="bismillah-card bismillah-max-width" style="max-width: 800px; margin: auto;">
        <div class="bismillah-flex bismillah-mb-5" style="border-bottom: 2px solid #eee; gap: 20px;">
            <div class="bismillah-p-3 bismillah-text-primary bismillah-font-extrabold"
                style="border-bottom: 4px solid var(--bismillah-primary-color); cursor: pointer;">Home</div>
            <div class="bismillah-p-3" style="cursor: pointer; color: #777;">Profile</div>
            <div class="bismillah-p-3" style="cursor: pointer; color: #777;">Settings</div>
        </div>
        <div class="bismillah-p-10 bismillah-bg-light bismillah-rounded">
            <h3 class="bismillah-text-2xl bismillah-mb-5">Welcome Home!</h3>
            <p>BismillahCSS components are designed to be clean, attractive, and high-performance. These tabs are built
                as a native HTML structure with CSS transitions for smooth user experiences.</p>
        </div>
    </div>

    <div class="bismillah-mt-10">
        <a href="../index.html" class="bismillah-btn bismillah-btn-secondary">Back to Home</a>
    </div>
</body>

</html>
