<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BismillahCSS - Modals Component</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bismillahcss/dist/bismillah.min.css">
    <link rel="stylesheet" href="./attractive.css">
</head>

<body class="bismillah-p-10">
    <h1 class="bismillah-text-4xl bismillah-font-extrabold bismillah-mb-10">Modals Component</h1>

    <div class="bismillah-card bismillah-p-5 bismillah-mb-10">
        <h2 class="bismillah-text-xl bismillah-mb-5">Modal Simulation</h2>
        <div class="bismillah-glass bismillah-p-10 bismillah-rounded-lg"
            style="max-width: 500px; border: 2px solid var(--bismillah-primary-color);">
            <div class="bismillah-flex-between bismillah-mb-5">
                <h3 class="bismillah-text-2xl bismillah-font-extrabold">Modal Title</h3>
                <span style="cursor: pointer; font-size: 1.5rem;">×</span>
            </div>
            <p class="bismillah-p bismillah-mb-8">This is a modal content simulated with BismillahCSS glassmorphism and
                shadow effects.</p>
            <div class="bismillah-flex bismillah-justify-end" style="gap: 10px;">
                <button class="bismillah-btn bismillah-btn-secondary">Close</button>
                <button class="bismillah-btn bismillah-btn-primary">Acknowledge</button>
            </div>
        </div>
    </div>

    <div class="bismillah-mt-10">
        <a href="../index.html" class="bismillah-btn bismillah-btn-secondary">Back to Home</a>
    </div>
</body>

</html>
