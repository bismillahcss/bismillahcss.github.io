<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BismillahCSS - Alerts Component</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bismillahcss/dist/bismillah.min.css">
    <link rel="stylesheet" href="./attractive.css">
</head>

<body class="bismillah-p-10">
    <h1 class="bismillah-text-4xl bismillah-font-extrabold bismillah-mb-10">Alerts & Messages</h1>

    <div class="bismillah-p-10 bismillah-bg-white bismillah-rounded-lg bismillah-shadow">
        <div class="bismillah-alert bismillah-alert-success bismillah-mb-5 bismillah-p-4 bismillah-rounded">
            <strong>Success!</strong> Your changes have been saved successfully.
        </div>

        <div class="bismillah-alert bismillah-alert-warning bismillah-mb-5 bismillah-p-4 bismillah-rounded">
            <strong>Warning!</strong> Your session is about to expire.
        </div>

        <div class="bismillah-alert bismillah-alert-danger bismillah-mb-5 bismillah-p-4 bismillah-rounded">
            <strong>Error!</strong> An error occurred while processing your request. Try again later.
        </div>

        <div class="bismillah-alert bismillah-bg-primary bismillah-text-light bismillah-p-4 bismillah-rounded">
            <strong>Notice:</strong> Maintenance scheduled for tonight at 2 AM.
        </div>
    </div>

    <div class="bismillah-mt-10">
        <a href="../index.html" class="bismillah-btn bismillah-btn-secondary">Back to Home</a>
    </div>
</body>

</html>
