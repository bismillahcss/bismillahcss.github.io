<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BismillahCSS - Navbar Component</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bismillahcss/dist/bismillah.min.css">
    <link rel="stylesheet" href="./attractive.css">
</head>

<body class="bismillah-p-10">
    <h1 class="bismillah-text-4xl bismillah-font-extrabold bismillah-mb-10">Navbar Component</h1>

    <nav class="bismillah-navbar bismillah-mb-10">
        <div class="bismillah-navbar-logo">
            <span class="bismillah-text-primary">Bismillah</span>CSS
        </div>
        <div class="bismillah-flex-between" style="width: 300px;">
            <a href="#" class="bismillah-link">Home</a>
            <a href="#" class="bismillah-link">Docs</a>
            <a href="#" class="bismillah-link">Showcase</a>
        </div>
        <button class="bismillah-btn bismillah-btn-primary">Get App</button>
    </nav>

    <div class="bismillah-card bismillah-mb-10">
        <h2 class="bismillah-text-xl bismillah-mb-5">Dark Navbar</h2>
        <nav class="bismillah-navbar bismillah-bg-dark bismillah-text-light bismillah-p-5">
            <div class="bismillah-navbar-logo bismillah-text-light">BismillahCSS</div>
            <div class="bismillah-flex-between" style="width: 200px;">
                <a href="#" class="bismillah-link bismillah-text-light">Pricing</a>
                <a href="#" class="bismillah-link bismillah-text-light">Contact</a>
            </div>
        </nav>
    </div>

    <div class="bismillah-mt-10">
        <a href="../index.html" class="bismillah-btn bismillah-btn-secondary">Back to Home</a>
    </div>
</body>

</html>
