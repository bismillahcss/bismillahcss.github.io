<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BismillahCSS - Typography Component</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bismillahcss/dist/bismillah.min.css">
    <link rel="stylesheet" href="./attractive.css">
</head>

<body class="bismillah-p-10">
    <h1 class="bismillah-text-4xl bismillah-font-extrabold bismillah-mb-10 text-center">Typography</h1>

    <div class="bismillah-card bismillah-mb-10">
        <h1 class="bismillah-text-5xl bismillah-font-extrabold bismillah-mb-5">Heading 1</h1>
        <h2 class="bismillah-text-4xl bismillah-mb-4">Heading 2</h2>
        <h3 class="bismillah-text-2xl bismillah-mb-3">Heading 3</h3>
        <p class="bismillah-p bismillah-mb-5">This is a standard paragraph showing the default line height and font
            family of BismillahCSS.</p>
        <p class="bismillah-p bismillah-text-primary bismillah-font-extrabold">Primary colored bold text.</p>
    </div>

    <div class="bismillah-card">
        <h2 class="bismillah-text-2xl bismillah-mb-5">Special Text Effects</h2>
        <p class="bismillah-text-neon-blue bismillah-text-2xl bismillah-mb-5">Neon Blue Text</p>
        <p class="bismillah-neon-pink bismillah-text-2xl bismillah-mb-5">Neon Pink Text</p>
        <div class="bismillah-p-5 bismillah-bg-dark bismillah-text-light bismillah-rounded">
            <p class="bismillah-animate-fade-in">Animated Reveal Text</p>
        </div>
    </div>

    <div class="bismillah-mt-10">
        <a href="../index.html" class="bismillah-btn bismillah-btn-secondary">Back to Home</a>
    </div>
</body>

</html>
