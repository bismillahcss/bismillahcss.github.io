<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BismillahCSS - Cards Component</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bismillahcss/dist/bismillah.min.css">
    <link rel="stylesheet" href="./attractive.css">
</head>

<body class="bismillah-p-10">
    <h1 class="bismillah-text-4xl bismillah-font-extrabold bismillah-mb-10">Cards Component</h1>

    <div class="bismillah-grid bismillah-grid-3">
        <div class="bismillah-card bismillah-p-5">
            <h3 class="bismillah-text-xl bismillah-mb-2">Standard Card</h3>
            <p class="bismillah-p bismillah-mb-4">This is a standard BismillahCSS card with a subtle shadow.</p>
            <button class="bismillah-btn bismillah-btn-primary">Learn More</button>
        </div>

        <div class="bismillah-card bismillah-glass bismillah-p-5">
            <h3 class="bismillah-text-xl bismillah-mb-2 bismillah-text-primary">Glass Card</h3>
            <p class="bismillah-p bismillah-mb-4">A card with a glassmorphism effect using backdrop-filter.</p>
            <button class="bismillah-btn bismillah-btn-secondary bismillah-glass">Explore</button>
        </div>

        <div class="bismillah-card bismillah-bg-primary bismillah-p-5 bismillah-text-light">
            <h3 class="bismillah-text-xl bismillah-mb-2">Color Card</h3>
            <p class="bismillah-p bismillah-mb-4">A vibrant card with a background color from our palette.</p>
            <button class="bismillah-btn bismillah-btn-secondary">Check Out</button>
        </div>
    </div>

    <div class="bismillah-mt-10">
        <a href="../index.html" class="bismillah-btn bismillah-btn-secondary">Back to Home</a>
    </div>
</body>

</html>
